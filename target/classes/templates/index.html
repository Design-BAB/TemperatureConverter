<!DOCTYPE html>
<html>
  <head>
    <script src="https://unpkg.com/htmx.org@1.9.2"></script>
    <link rel="stylesheet" href="/static/sakura.css">
    <title> Temperature Converter </title>
  </head>
  <body>
    <center>
    <h1>☁️ Temperature converter!🌡️</h1>
    <form hx-get="/convert" hx-target="#result" hx-swap="innerHTML" hx-trigger="submit">
      <table>
      <tr>
      <td>
      <input type="radio" id="f" name="tempType" value="Fahrenheit" hx-get="/form-label" hx-trigger="change" hx-target="#input-selection" checked>
      <label for="f">Fahrenheit</label><br><br>
      <input type="radio" id="c" name="tempType" value="Celsius" hx-get="/form-label" hx-trigger="change" hx-target="#input-selection">
      <label for="c">Celsius</label><br>
      </td><td>
      <div id = "input-selection">
      <label for="number1">Fahrenheit: </label> 
      <input type="number" id="number1" name="number1" min="-1">
      </div>
      </td></tr></table>
      <br>
      <input type="submit" value="Submit">
    </form>
    <button hx-get="/hello" hx-target="#result">Click me</button>
    <div id="result" style="margin-top:20px;">
    </div>
    </center>
  </body>
</html>
